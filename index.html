<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 爱心粒子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #06060e;
  }
  canvas { display: block; }
  .msg {
    position: fixed; bottom: 30px; width: 100%; text-align: center;
    color: rgba(255,255,255,0.45); font-size: 14px;
    pointer-events: none; z-index: 10;
    font-family: 'Microsoft YaHei', sans-serif;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="msg">💛 自动运行中 · 点击屏幕制造涟漪 💛</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, scale, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  scale = Math.min(W, H) / 26;
}
resize();
window.addEventListener('resize', resize);

// ---- 预渲染小爱心精灵 ----
const SPR_SIZE = 16;
const sprCanvas = document.createElement('canvas');
sprCanvas.width = sprCanvas.height = SPR_SIZE;
const sprCtx = sprCanvas.getContext('2d');
(function renderSprite() {
  sprCtx.clearRect(0, 0, SPR_SIZE, SPR_SIZE);
  sprCtx.save();
  sprCtx.translate(SPR_SIZE/2, SPR_SIZE/2);
  sprCtx.scale(SPR_SIZE/18, SPR_SIZE/18);
  sprCtx.beginPath();
  for (let t = 0; t <= Math.PI * 2; t += 0.05) {
    const px = 16 * Math.pow(Math.sin(t), 3);
    const py = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    if (t === 0) sprCtx.moveTo(px, py);
    else sprCtx.lineTo(px, py);
  }
  sprCtx.closePath();
  sprCtx.fillStyle = '#fff';
  sprCtx.fill();
  sprCtx.restore();
})();

// 预着色精灵缓存
const tintCache = {};
function getTintedSprite(r, g, b) {
  const key = `${r},${g},${b}`;
  if (tintCache[key]) return tintCache[key];
  const c = document.createElement('canvas');
  c.width = c.height = SPR_SIZE;
  const t = c.getContext('2d');
  t.drawImage(sprCanvas, 0, 0);
  t.globalCompositeOperation = 'source-atop';
  t.fillStyle = `rgb(${r},${g},${b})`;
  t.fillRect(0, 0, SPR_SIZE, SPR_SIZE);
  tintCache[key] = c;
  return c;
}

// ---- 爱心曲线数学 ----
function heartPos(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

function heartNormal(t) {
  const dx = 48 * Math.pow(Math.sin(t), 2) * Math.cos(t);
  const dy = -(-13 * Math.sin(t) + 10 * Math.sin(2*t) + 6 * Math.sin(3*t) + 4 * Math.sin(4*t));
  const len = Math.sqrt(dx*dx + dy*dy) || 0.001;
  return { nx: -dy / len, ny: dx / len };
}

// ---- 调色板 ----
const PALETTE = [
  [255, 64, 129], [255, 23, 68], [255, 82, 82],
  [224, 64, 251], [255, 110, 110], [240, 98, 146],
  [255, 128, 171], [186, 104, 200],
];

// ---- 轮廓粒子 ----
const NUM_OUTLINE = 300;
const outlineParticles = [];

class OutlineParticle {
  constructor() {
    this.t = Math.random() * Math.PI * 2;
    this.speed = (Math.random() < 0.5 ? 1 : -1) * (0.003 + Math.random() * 0.015);
    this.offsetBase = (Math.random() - 0.5) * 2.2;
    this.offsetAmp = 0.3 + Math.random() * 1.6;
    this.offsetPhase = Math.random() * Math.PI * 2;
    this.offsetSpeed = 0.01 + Math.random() * 0.04;
    this.size = 0.3 + Math.random() * 1.4;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.alpha = 0.45 + Math.random() * 0.55;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.02 + Math.random() * 0.04;
    // wander
    this.wanderTarget = this.offsetBase;
    this.wanderTimer = 60 + Math.random() * 300;
    this.isWandering = false;
  }

  getScreenPos() {
    const raw = heartPos(this.t);
    const n = heartNormal(this.t);
    const wobble = Math.sin(this.offsetPhase) * this.offsetAmp;
    const off = this.offsetBase + wobble;
    return {
      sx: cx + (raw.x + n.nx * off) * scale,
      sy: cy + (raw.y + n.ny * off) * scale
    };
  }

  update(mouse) {
    this.t += this.speed;
    if (this.t > Math.PI * 2) this.t -= Math.PI * 2;
    if (this.t < 0) this.t += Math.PI * 2;
    this.offsetPhase += this.offsetSpeed;
    this.pulsePhase += this.pulseSpeed;

    // wander logic
    this.wanderTimer--;
    if (this.wanderTimer <= 0) {
      if (this.isWandering) {
        this.isWandering = false;
        this.wanderTarget = (Math.random() - 0.5) * 2.2;
        this.wanderTimer = 100 + Math.random() * 300;
      } else {
        this.isWandering = true;
        this.wanderTarget = (Math.random() - 0.5) * 7;
        this.wanderTimer = 25 + Math.random() * 60;
      }
    }
    this.offsetBase += (this.wanderTarget - this.offsetBase) * 0.04;

    // mouse repulsion
    if (mouse && mouse.active) {
      const p = this.getScreenPos();
      const dx = p.sx - mouse.x;
      const dy = p.sy - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 130) {
        const force = (1 - dist / 130);
        this.t += (dx / (dist + 0.1)) * 0.004 * force;
        this.offsetBase += (dy / (dist + 0.1)) * 0.6 * force;
      }
    }
  }

  draw(ctx) {
    const p = this.getScreenPos();
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.18;
    const s = this.size * scale * 0.65 * pulse;
    if (s < 0.4) return;

    const alpha = this.alpha * (0.75 + 0.25 * Math.sin(this.pulsePhase));
    const [r, g, b] = this.color;

    // glow
    ctx.save();
    ctx.globalAlpha = alpha * 0.25;
    ctx.drawImage(sprCanvas, p.sx - s*2.5, p.sy - s*2.5, s*5, s*5);

    // main sprite
    ctx.globalAlpha = alpha;
    const tinted = getTintedSprite(r, g, b);
    ctx.drawImage(tinted, p.sx - s, p.sy - s, s*2, s*2);
    ctx.restore();
  }
}

// ---- 内部光点 ----
const NUM_INNER = 70;
const innerDots = [];

class InnerDot {
  constructor() {
    this.t = Math.random() * Math.PI * 2;
    this.r = 0.1 + Math.random() * 0.75;
    this.speed = 0.004 + Math.random() * 0.014;
    this.size = 0.6 + Math.random() * 2.2;
    this.alpha = 0.15 + Math.random() * 0.3;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.pulseP = Math.random() * Math.PI * 2;
    this.pulseS = 0.02 + Math.random() * 0.05;
  }
  update() {
    this.t += this.speed;
    if (this.t > Math.PI * 2) this.t -= Math.PI * 2;
    this.pulseP += this.pulseS;
  }
  draw(ctx) {
    const raw = heartPos(this.t);
    const rr = this.r * (0.9 + 0.1 * Math.sin(this.pulseP));
    const sx = cx + raw.x * scale * rr;
    const sy = cy + raw.y * scale * rr;
    const s = this.size * scale * 0.14;
    if (s < 0.3) return;
    const alpha = this.alpha * (0.6 + 0.4 * Math.sin(this.pulseP));
    const [r, g, b] = this.color;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.shadowColor = `rgb(${r},${g},${b})`;
    ctx.shadowBlur = s * 4;
    ctx.beginPath();
    ctx.arc(sx, sy, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ---- 背景光晕 ----
function drawBgGlow() {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const grad = ctx.createRadialGradient(0, -2, 1.5, 0, 0, 19);
  grad.addColorStop(0, 'rgba(255,64,129,0.07)');
  grad.addColorStop(0.4, 'rgba(255,23,68,0.04)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(-22, -22, 44, 44);

  // subtle outline
  ctx.beginPath();
  for (let t = 0; t <= Math.PI*2; t += 0.03) {
    const p = heartPos(t);
    t === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,100,160,0.1)';
  ctx.lineWidth = 1.2;
  ctx.shadowColor = 'rgba(255,80,130,0.3)';
  ctx.shadowBlur = 18;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ---- 涟漪 ----
const ripples = [];
class Ripple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 2;
    this.maxR = 50 + Math.random() * 70;
    this.speed = 1.8 + Math.random() * 3;
    this.life = 1;
    this.decay = 0.016 + Math.random() * 0.025;
  }
  update() {
    this.r += this.speed;
    this.life -= this.decay;
    return this.life <= 0;
  }
  draw(ctx) {
    ctx.strokeStyle = `rgba(255,160,190,${this.life * 0.5})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ---- 鼠标 ----
const mouse = { x: -999, y: -999, active: false };
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

function doBurst(x, y) {
  for (let i = 0; i < 3; i++) ripples.push(new Ripple(x, y));
}
canvas.addEventListener('click', e => doBurst(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (let t of e.touches) doBurst(t.clientX, t.clientY);
}, { passive: false });

// ---- 初始化 ----
for (let i = 0; i < NUM_OUTLINE; i++) outlineParticles.push(new OutlineParticle());
for (let i = 0; i < NUM_INNER; i++) innerDots.push(new InnerDot());

// ---- 动画 ----
function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBgGlow();
  for (let p of outlineParticles) { p.update(mouse); p.draw(ctx); }
  for (let d of innerDots) { d.update(); d.draw(ctx); }
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (ripples[i].update()) ripples.splice(i, 1);
    else ripples[i].draw(ctx);
  }
  requestAnimationFrame(animate);
}
animate();
console.log('💖 爱心粒子已就绪！');
</script>
</body>
</html>
